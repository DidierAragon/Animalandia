<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — Animalandia</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo"><h1>🐾 Animalandia</h1></div>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="productos.html">Productos</a></li>
      <li><a href="galeria.html">Galería</a></li>
      <li><a href="carrito.html">🛒 Carrito (<span id="contador">0</span>)</a></li>
    </ul>
  </nav>

  <div class="filtros">
    <input type="text" id="busqueda" placeholder="🔍 Buscar producto..." oninput="filtrar()">
    <button class="filtro-btn active" onclick="setCategoria(this, '')">Todos</button>
    <button class="filtro-btn" onclick="setCategoria(this,'perros')">🐶 Perros</button>
    <button class="filtro-btn" onclick="setCategoria(this,'gatos')">🐱 Gatos</button>
    <button class="filtro-btn" onclick="setCategoria(this,'aves')">🦜 Aves</button>
    <button class="filtro-btn" onclick="setCategoria(this,'peces')">🐠 Peces</button>
  </div>

  <main>
    <div class="productos-grid" id="grid"></div>
  </main>

  <div id="toast"></div>

  <script src="/static/script.js"></script>
</body>
</html>
